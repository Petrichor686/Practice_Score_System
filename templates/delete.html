{% extends "base.html" %}
{% block title %}删除数据 - 社会实践成绩管理系统{% endblock %}

{% block content %}
<div class="page-header mb-4">
    <h2><i class="bi bi-trash text-danger"></i> 删除数据</h2>
    <p class="text-muted">删除年级或学生信息（请谨慎操作）</p>
</div>

<div class="row">
    <div class="col-lg-6 mb-4">
        <div class="card shadow-sm border-danger h-100">
            <div class="card-header bg-danger text-white">
                <i class="bi bi-folder-minus"></i> 删除年级
            </div>
            <div class="card-body">
                <div class="alert alert-warning">
                    <i class="bi bi-exclamation-triangle"></i>
                    <strong>警告：</strong>删除年级将删除该年级所有学生数据！
                </div>
                <form method="POST">
                    <input type="hidden" name="action" value="delete_grade">
                    <div class="mb-3">
                        <label class="form-label">选择要删除的年级</label>
                        <select class="form-select" name="grade" required>
                            <option value="">-- 请选择 --</option>
                            {% for g in grades %}
                            <option value="{{ g }}">{{ g }}级</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">确认删除</label>
                        <input type="text" class="form-control" name="confirm" placeholder="请输入年级编号以确认删除" required>
                    </div>
                    <button type="submit" class="btn btn-danger w-100">
                        <i class="bi bi-trash"></i> 确认删除年级
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div class="col-lg-6 mb-4">
        <div class="card shadow-sm border-warning h-100">
            <div class="card-header bg-warning">
                <i class="bi bi-person-dash"></i> 删除学生
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="action" value="delete_student">
                    <div class="mb-3">
                        <label class="form-label">选择年级</label>
                        <select class="form-select" name="grade" id="grade" required>
                            <option value="">-- 请选择 --</option>
                            {% for g in grades %}
                            <option value="{{ g }}">{{ g }}级</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">学号</label>
                        <input type="text" class="form-control" name="student_id" id="student_id" placeholder="请输入要删除的学号" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">学生姓名</label>
                        <input type="text" class="form-control" id="student_name" readonly placeholder="输入学号后自动显示">
                    </div>
                    <button type="submit" class="btn btn-warning w-100">
                        <i class="bi bi-person-dash"></i> 删除学生
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('student_id').addEventListener('blur', function() {
    const grade = document.getElementById('grade').value;
    const studentId = this.value;
    if (grade && studentId) {
        fetch('/api/get_student/' + grade + '/' + studentId)
            .then(response => response.json())
            .then(data => {
                document.getElementById('student_name').value = data.name || '未找到该学生';
            });
    }
});
</script>
{% endblock %}
